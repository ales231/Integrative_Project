# Black Hat Bash — 8 contenedores, redes dmz + internal

services:
  attacker:
    build: services/attacker
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-attacker
    hostname: attacker
    networks:
      dmz:
        ipv4_address: 172.28.10.2
    volumes:
      - ./offensive:/lab/offensive
    cap_add:
      - NET_RAW
    depends_on:
      - victim-web
      - victim-ftp

  victim-web:
    build: services/victim-web
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-victim-web
    hostname: victim-web
    networks:
      dmz:
        ipv4_address: 172.28.10.10
    ports:
      - "${WEB_PORT:-8080}:80"

  victim-ftp:
    build: services/victim-ftp
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-victim-ftp
    hostname: victim-ftp
    security_opt:
      - seccomp:unconfined
    networks:
      dmz:
        ipv4_address: 172.28.10.11
      internal:
        ipv4_address: 172.28.20.11

  victim-db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-victim-db
    hostname: victim-db
    environment:
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: ${LAB_DB_PASS:-changeme}
      POSTGRES_DB: labdb
    networks:
      internal:
        ipv4_address: 172.28.20.15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 10s
      timeout: 5s
      retries: 3

  dns:
    image: strm/dnsmasq
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-dns
    hostname: dns
    networks:
      internal:
        ipv4_address: 172.28.20.53
    cap_add:
      - NET_ADMIN

  mail:
    image: boky/postfix:latest
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-mail
    hostname: mail
    environment:
      ALLOWED_SENDER_DOMAINS: lab.local
      HOSTNAME: mail.lab.local
    networks:
      internal:
        ipv4_address: 172.28.20.25

  monitor:
    build: services/monitor
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-monitor
    hostname: monitor
    networks:
      internal:
        ipv4_address: 172.28.20.30

  jumpbox:
    build: services/jumpbox
    container_name: ${COMPOSE_PROJECT_NAME:-integrative-lab}-jumpbox
    hostname: jumpbox
    networks:
      dmz:
        ipv4_address: 172.28.10.13
      internal:
        ipv4_address: 172.28.20.12
    ports:
      - "${JUMPBOX_SSH_PORT:-2222}:22"

networks:
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.20.0/24
